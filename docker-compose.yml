services:
  postgres:
    image: postgres:16-alpine
    container_name: padel-prode-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
      POSTGRES_DB: padel_prode
    ports:
      - "5433:5432"
    volumes:
      - padel_prode_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padel -d padel_prode"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  padel_prode_data:
